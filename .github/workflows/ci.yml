name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python3 -m pip install ruff
      - name: Run ruff
        run: ruff check custom_components/paperang/
      - name: Check formatting
        run: ruff format --check custom_components/paperang/
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python3 -m pip install pytest pytest-cov voluptuous pytest-homeassistant-custom-component pyusb
      - name: Run unit tests with coverage
        run: python3 -m pytest tests/ --ignore=tests/test_e2e_*.py -v --cov=custom_components/paperang --cov-report=xml --cov-report=term
      - name: Run e2e integration tests
        run: python3 -m pytest tests/test_e2e_*.py -v --tb=short
      - name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both
          fail_below_min: true
          thresholds: "80 80"
      - name: Generate coverage badge SVG
        run: |
          python3 -m pip install coverage-badge
          coverage-badge -o coverage.svg -f
      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage.svg
  smoke-test:
    name: HA Container Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/smoke/Dockerfile.ha-test
          tags: paperang-ha-test:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run smoke test
        run: bash tests/smoke/run.sh --skip-build
  coverage-badge:
    name: Coverage Badge
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
      - name: Deploy to badges branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: badges
          force_orphan: true
          user_name: github-actions
          user_email: github-actions@github.com
          commit_message: Update coverage badge
