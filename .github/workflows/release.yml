name: Release
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  release-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check manifest version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/paperang/manifest.json'))['version'])")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: Tag version '$TAG_VERSION' does not match manifest version '$MANIFEST_VERSION'"
            exit 1
          fi
          echo "✓ Version check passed: $TAG_VERSION"
      - name: ZIP Component Dir
        run: |
          cd ${{ github.workspace }}/custom_components/paperang
          zip -r paperang.zip ./
      - name: Upload zip to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/custom_components/paperang/paperang.zip
          asset_name: paperang.zip
          tag: ${{ github.ref }}
          overwrite: true

